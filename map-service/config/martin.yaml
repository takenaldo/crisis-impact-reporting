# Martin tile server configuration
# Reference: https://maplibre.org/martin/config-file/

listen_addresses: "0.0.0.0:3000"
worker_processes: 4

# MBTiles sources — one per country
mbtiles:
  sources:
    ethiopia:
      path: /data/tiles/ethiopia.mbtiles
    kenya:
      path: /data/tiles/kenya.mbtiles
    somalia:
      path: /data/tiles/somalia.mbtiles
    sudan:
      path: /data/tiles/sudan.mbtiles
    south_sudan:
      path: /data/tiles/south-sudan.mbtiles
    djibouti:
      path: /data/tiles/djibouti.mbtiles
    eritrea:
      path: /data/tiles/eritrea.mbtiles
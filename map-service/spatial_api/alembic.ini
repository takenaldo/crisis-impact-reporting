[alembic]
script_location = alembic
prepend_sys_path = .

# Database URL is read from environment variable
# Set DATABASE_URL in your .env file or docker-compose environment
sqlalchemy.url = postgresql+asyncpg://postgres:password@db:5432/undp_damage_db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
